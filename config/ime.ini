; keyon 输入法状态切换配置
;
; 当前实际启用状态以文件底部未注释的配置为准。
;
; [general]
; enabled=true
; profile=microsoftPinyin
; switchMethod=dll/lShift/rShift/ctrlSpace
; checkTimeout=500
;
; [hotkey.toEnglish]
; enabled=true
; hotkey=CapsLock
; targetState=EN
; processNames=Code.exe|WeChat.exe
; passThrough=false
; sendAfterSwitch=
;
; [hotkey.toChinese]
; enabled=true
; hotkey=RShift
; targetState=CN
; passThrough=true
;
; [appDefaults]
; enabled=true
; interval=100
; focusDelay=80
;
; [appDefault.toEnglish]
; enabled=true
; processNames=WindowsTerminal.exe
; switchMethod=dll
;
; [appDefault.toChinese]
; enabled=true
; processNames=Weixin.exe|WXWork.exe
; switchMethod=dll

[general]
enabled=true
profile=wechatInput
switchMethod=dll
checkTimeout=500

[appDefaults]
enabled=true
interval=100
focusDelay=80

[appDefault.toEnglish]
enabled=true
processNames=WindowsTerminal.exe
switchMethod=dll

[appDefault.toChinese]
enabled=true
processNames=Weixin.exe|WXWork.exe|Codex.exe
switchMethod=dll

[hotkey.toEnglish]
enabled=true
hotkey=Esc
targetState=EN
processNames=WindowsTerminal.exe
passThrough=true
switchMethod=dll
sendAfterSwitch=

[hotkey.toggle]
enabled=true
hotkey=RAlt
targetState=TOGGLE
passThrough=false
switchMethod=dll
