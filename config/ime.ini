; keyon 输入法状态切换配置
;
; 当前实际启用状态以文件底部未注释的配置为准。
;
; [general]
; enabled=true
; profile=microsoftPinyin
; switchMethod=dll/lShift/rShift/ctrlSpace
; checkTimeout=500
;
; [hotkey.toEnglish]
; enabled=true
; hotkey=CapsLock
; targetState=EN
; winTitles=ahk_exe Code.exe|ahk_exe WeChat.exe
; matchMode=contains
; passThrough=false
; sendAfterSwitch=
;
; [hotkey.toChinese]
; enabled=true
; hotkey=RShift
; targetState=CN
; passThrough=true

[general]
enabled=true
profile=wechatInput
switchMethod=dll
checkTimeout=500

[hotkey.toEnglish]
enabled=true
hotkey=Esc
targetState=EN
winTitles=ahk_exe WindowsTerminal.exe
matchMode=contains
passThrough=true
switchMethod=dll
sendAfterSwitch=

[hotkey.toggle]
enabled=true
hotkey=RAlt
targetState=TOGGLE
passThrough=false
switchMethod=dll
