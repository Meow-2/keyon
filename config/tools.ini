; mine-key 工具类快捷键配置
; 当前实际启用状态以文件底部未注释的配置为准。
;
; 使用方法：
;   1. 复制下面的示例。
;   2. 去掉每行开头的分号。
;   3. 按需要修改 hotkey。
;   4. 完整字段说明见 README.md 的“工具类快捷键配置”章节。
;
; [windowInfo]
; enabled=true
; hotkey=#!i
; copyToClipboard=true
;
; [windowControl]
; enabled=true
; closeHotkey=#q
; nextHotkey=#j
; previousHotkey=#k
; switchMode=managed
; waitSeconds=1
; previewSeconds=0.6
; previewMaxItems=8
; previewFontSize=16
; previewWidth=760

[windowInfo]
enabled=true
hotkey=#+x
copyToClipboard=true

[windowControl]
enabled=true
closeHotkey=#q
nextHotkey=#j
previousHotkey=#k
switchMode=system
waitSeconds=1
previewSeconds=0.6
previewMaxItems=8
previewFontSize=16
previewWidth=760
