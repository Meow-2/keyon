; keyon 应用快捷键配置
; 当前没有启用任何真实应用快捷键。
;
; 使用方法：
;   1. 复制下面的示例。
;   2. 去掉每行开头的分号。
;   3. 按实际应用修改 hotkey、winTitle 和 target。
;   4. 完整字段说明见 README.md 的“应用快捷键配置”章节。
;
; 最小示例：
;
; [notepad]
; hotkey=#!n
; winTitle=ahk_exe notepad.exe
; target=notepad.exe
; runAsAdmin=false
;
; 完整示例：
;
; [exampleNotepad]
; enabled=true
; hotkey=#!n
; winTitle=ahk_exe notepad.exe
; matchMode=contains
; target=notepad.exe
; args=
; workingDir=
; processName=notepad.exe
; wakeHotkey=
; detectHidden=false
; waitSeconds=3
; runAsAdmin=false

[claude]
hotkey=#m
winTitle=ahk_exe Claude.exe
target=C:\Program Files\WindowsApps\Claude_1.6259.1.0_x64__pzs8sxrjxfjjc\app\claude.exe
